volumes:
  tmp_images:
  redis_data:

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: gunicorn --bind 0.0.0.0:5000 wsgi:app --workers 4 --threads 2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      #- BASE_URL=https://example.com
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 worker.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/worker.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      replicas: 4  # Increase for more concurrent camera alerts (1 per simultaneous camera)

  mute_bot:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 mute_bot.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/mute_bot.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bi_exporter:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_exporter.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/bi_exporter.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Single replica is intentional — export submission must stay ordered.

  bi_queue_monitor:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_queue_monitor.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/bi_queue_monitor.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Single replica is intentional — one shared queue poller per BI instance.

  bi_downloader:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_downloader.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/bi_downloader.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Keep single replica until per-job file path ownership is expanded.

  bi_watchdog:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_watchdog.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/bi_watchdog.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  video_delivery_worker:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 video_delivery_worker.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,time,sys; p='/app/data/health/video_delivery_worker.json'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<45 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
