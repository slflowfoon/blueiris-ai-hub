volumes:
  tmp_images:
  redis_data:

services:
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  web:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: gunicorn --bind 0.0.0.0:5000 wsgi:app --workers 4 --threads 2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BASE_URL=${BASE_URL:?Set BASE_URL in .env to the hub URL reachable by TVs}
      #- TV_OVERLAY_APK_URL=https://example.com/path/to/pr-or-test-apk.apk
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys, urllib.request, urllib.error; url='http://localhost:5000/health';\ntry: urllib.request.urlopen(url, timeout=5).read(); sys.exit(0)\nexcept urllib.error.HTTPError: sys.exit(0)\nexcept Exception: sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 worker.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - BASE_URL=${BASE_URL:?Set BASE_URL in .env to the hub URL reachable by TVs}
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('worker')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # All worker replicas share one heartbeat file, so this is a service-level signal.
    deploy:
      replicas: 4  # Increase for more concurrent camera alerts (1 per simultaneous camera)

  mute_bot:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 mute_bot.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('mute_bot')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  bi_exporter:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_exporter.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('bi_exporter')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Single replica is intentional — export submission must stay ordered.

  bi_queue_monitor:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_queue_monitor.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('bi_queue_monitor')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Single replica is intentional — one shared queue poller per BI instance.

  bi_downloader:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_downloader.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('bi_downloader')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Keep single replica until per-job file path ownership is expanded.

  bi_watchdog:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_watchdog.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('bi_watchdog')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  video_delivery_worker:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 video_delivery_worker.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - tmp_images:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "python3", "-c", "from service_health import heartbeat_status; import sys; sys.exit(0 if heartbeat_status('video_delivery_worker')['status'] == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    # Safe to scale with `docker compose up -d --scale video_delivery_worker=<n>`.
    # Per-job Redis delivery claims prevent duplicate processing across replicas.
