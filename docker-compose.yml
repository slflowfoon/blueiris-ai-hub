services:
  redis:
    image: redis:alpine
    restart: unless-stopped

  web:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: gunicorn --bind 0.0.0.0:5000 wsgi:app --workers 4 --threads 2
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/tmp_images
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      #- BASE_URL=https://example.com
    restart: unless-stopped

  worker:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 worker.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    deploy:
      replicas: 4  # Increase for more concurrent camera alerts (1 per simultaneous camera)

  mute_bot:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 mute_bot.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

  bi_exporter:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_exporter.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    # Single replica is intentional — export submission must stay ordered.

  bi_queue_monitor:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_queue_monitor.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    # Single replica is intentional — one shared queue poller per BI instance.

  bi_downloader:
    image: ghcr.io/slflowfoon/blueiris-ai-hub:latest
    command: python3 bi_downloader.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev/shm:/tmp_images
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    # Keep single replica until per-job file path ownership is expanded.
