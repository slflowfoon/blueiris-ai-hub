name: Build and attach APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-tv-overlay

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-tv-overlay/**/*.gradle*', 'android-tv-overlay/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Decode keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/android-tv-overlay/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk pipup-${{ github.ref_name }}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: android-tv-overlay/pipup-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
