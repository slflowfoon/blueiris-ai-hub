name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Run Pytest
        run: |
          mkdir -p ./test_data ./test_logs ./test_tmp
          export PYTHONPATH=app
          export DATA_DIR=./test_data
          export LOG_FILE=./test_logs/system.log
          export TEMP_IMAGE_DIR=./test_tmp
          export REDIS_URL=redis://localhost:6379/0
          pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build image locally for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp_scan_target
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}

      - name: Smoke test container entrypoints
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp_scan_target
          
          echo "Verifying Tasks Logic..."
          docker run --rm $IMAGE python3 -c "import tasks; print('Tasks OK')"
          
          echo "Verifying Web (WSGI)..."
          docker run --rm $IMAGE python3 -c "import wsgi; print('WSGI OK')"
          
          echo "Verifying Worker..."
          docker run --rm $IMAGE python3 -c "import worker; print('Worker OK')"
          
          echo "Verifying Mute Bot..."
          docker run --rm $IMAGE python3 -c "import mute_bot; print('Mute Bot OK')"
          
          echo "Verifying BI Exporter..."
          docker run --rm $IMAGE python3 -c "import bi_exporter; print('BI Exporter OK')"

          echo "Verifying BI Queue Monitor..."
          docker run --rm $IMAGE python3 -c "import bi_queue_monitor; print('BI Queue Monitor OK')"

          echo "Verifying BI Downloader..."
          docker run --rm $IMAGE python3 -c "import bi_downloader; print('BI Downloader OK')"

          echo "Verifying BI Watchdog..."
          docker run --rm $IMAGE python3 -c "import bi_watchdog; print('BI Watchdog OK')"

          echo "Verifying Video Delivery Worker..."
          docker run --rm $IMAGE python3 -c "import video_delivery_worker; print('Video Delivery Worker OK')"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:temp_scan_target
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build and push to registry
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
